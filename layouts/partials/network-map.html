<section class="map-section">
  <div class="map-inner">
    <div class="map-header">
      <div>
        <div class="eyebrow">Infrastructure</div>
        <h2 class="map-title">Tennessee Research &amp; Education Network Topology</h2>
      </div>
      <div class="map-legend">
        <span class="legend-item"><span class="leg-star">★</span> Hub</span>
        <span class="legend-item"><span class="leg-dot"></span> University / Affiliate</span>
        <span class="legend-item"><span class="leg-line"></span> Active</span>
        <span class="legend-item"><span class="leg-line leg-line--dash"></span> Planned</span>
        <span class="legend-item"><span class="leg-star" style="color:#F59E0B">★</span> Degraded</span>
      </div>
    </div>
    <div class="map-wrap">
      <img src="{{ "images/network-map.svg" | relURL }}"
           alt="TREN network topology map showing hubs in Memphis, Nashville, Cookeville, Knoxville and Chattanooga with university affiliates"
           style="width:100%;height:auto;display:block;">
    </div>
  </div>
</section>
