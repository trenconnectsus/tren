<section class="map-section">
  <div class="map-inner">
    <div class="map-header">
      <div>
        <div class="eyebrow">Infrastructure</div>
        <h2 class="map-title">Tennessee Research &amp; Education Network Topology</h2>
      </div>
      <div class="map-legend">
        <span class="legend-item"><span class="legend-star">★</span> Hub</span>
        <span class="legend-item"><span class="legend-dot legend-dot--affiliate"></span> University / Affiliate</span>
        <span class="legend-item"><span class="legend-line legend-line--active"></span> Active</span>
        <span class="legend-item"><span class="legend-line legend-line--planned"></span> Planned</span>
      </div>
    </div>
    <div class="map-wrap">
      <svg id="tren-map" viewBox="0 0 800 330" xmlns="http://www.w3.org/2000/svg"
           role="img" aria-label="TREN network topology map" style="width:100%;height:auto;display:block;">

        <!-- Tennessee state outline -->
        <path id="tn-outline" d="
          M 38,112 L 58,78 L 115,58 L 205,48 L 305,43
          L 405,40 L 505,36 L 605,32 L 688,28 L 758,30
          L 764,62 L 762,92 L 742,108 L 722,122 L 700,136
          L 678,152 L 648,163 L 612,168 L 578,184 L 548,192
          L 512,194 L 482,208 L 442,218 L 400,220 L 362,218
          L 322,226 L 282,236 L 242,246 L 202,256 L 162,265
          L 122,272 L 85,274 L 56,272 L 36,262 L 30,246
          L 34,198 L 38,112 Z"
          fill="#EEF2F7" stroke="#CBD5E1" stroke-width="1.5"/>

        <!-- Rendered by JavaScript below -->
        <g id="map-links"></g>
        <g id="map-affiliate-links"></g>
        <g id="map-affiliate-nodes"></g>
        <g id="map-hub-nodes"></g>
        <g id="map-labels"></g>
      </svg>
    </div>
  </div>
</section>

<script>
(function () {
  // Network data injected by Hugo at build time
  // Edit data/network.yaml — push — map updates. No image editing needed.
  const NET = {{ .Site.Data.network | jsonify }};

  const SVG_NS = "http://www.w3.org/2000/svg";

  // ── Colours ──────────────────────────────────────────────────────────────
  const COLOR = {
    hubActive:        "#1B5FAA",
    hubPlanned:       "#1B5FAA",
    hubNode:          "#F5C518",
    hubNodeStroke:    "#B8960C",
    affActive:        "#27803C",
    affPlanned:       "#27803C",
    affNode:          "#27803C",
    affNodeStroke:    "#1A5C2A",
    label:            "#1a1a1a",
    labelSmall:       "#4a4a4a",
  };

  function el(tag, attrs, parent) {
    const e = document.createElementNS(SVG_NS, tag);
    for (const [k, v] of Object.entries(attrs)) e.setAttribute(k, v);
    if (parent) parent.appendChild(e);
    return e;
  }

  // ── Find hub by id ────────────────────────────────────────────────────────
  function hub(id) {
    return NET.hubs.find(h => h.id === id);
  }

  // ── 5-pointed star path ───────────────────────────────────────────────────
  function starPath(cx, cy, R, r) {
    const pts = [];
    for (let i = 0; i < 10; i++) {
      const radius = i % 2 === 0 ? R : r;
      const angle  = (i * Math.PI / 5) - Math.PI / 2;
      pts.push((cx + radius * Math.cos(angle)).toFixed(2) + "," +
               (cy + radius * Math.sin(angle)).toFixed(2));
    }
    return "M " + pts.join(" L ") + " Z";
  }

  // ── Draw backbone links ───────────────────────────────────────────────────
  const gLinks = document.getElementById("map-links");
  for (const link of NET.links) {
    const a = hub(link.from), b = hub(link.to);
    if (!a || !b) continue;
    const isActive = link.status === "active";
    el("line", {
      x1: a.x, y1: a.y, x2: b.x, y2: b.y,
      stroke:           COLOR.hubActive,
      "stroke-width":   isActive ? 3 : 2.5,
      "stroke-opacity": isActive ? 1 : 0.55,
      "stroke-dasharray": isActive ? "none" : "10,6",
    }, gLinks);
  }

  // ── Draw affiliate links ──────────────────────────────────────────────────
  const gAffLinks = document.getElementById("map-affiliate-links");
  for (const aff of NET.affiliates) {
    const h = hub(aff.hub);
    if (!h) continue;
    const isActive = aff.status === "active";
    el("line", {
      x1: aff.x, y1: aff.y, x2: h.x, y2: h.y,
      stroke:           COLOR.affActive,
      "stroke-width":   isActive ? 2 : 1.5,
      "stroke-opacity": isActive ? 1 : 0.55,
      "stroke-dasharray": isActive ? "none" : "6,4",
    }, gAffLinks);
  }

  // ── Draw affiliate nodes ──────────────────────────────────────────────────
  const gAffNodes = document.getElementById("map-affiliate-nodes");
  for (const aff of NET.affiliates) {
    const isActive = aff.status === "active";
    const g = el("g", { class: "map-node", style: "cursor:default" }, gAffNodes);
    el("title", {}, g).textContent = aff.name + (isActive ? " — Active" : " — Planned");

    // Pulse ring for active nodes
    if (isActive) {
      el("circle", {
        cx: aff.x, cy: aff.y, r: 10,
        fill: COLOR.affNode, "fill-opacity": 0.15,
      }, g);
    }
    el("circle", {
      cx: aff.x, cy: aff.y, r: 5.5,
      fill:         isActive ? COLOR.affNode : "white",
      stroke:       COLOR.affNodeStroke,
      "stroke-width": 1.5,
      "fill-opacity": isActive ? 1 : 0.7,
    }, g);
  }

  // ── Draw hub nodes (yellow stars) ─────────────────────────────────────────
  const gHubs = document.getElementById("map-hub-nodes");
  for (const h of NET.hubs) {
    const isActive = h.status === "active";
    const g = el("g", { class: "map-node", style: "cursor:default" }, gHubs);
    el("title", {}, g).textContent = h.name + (isActive ? " — Active Hub" : " — Planned Hub");

    if (isActive) {
      el("circle", {
        cx: h.x, cy: h.y, r: 18,
        fill: COLOR.hubNode, "fill-opacity": 0.2,
      }, g);
    }
    el("path", {
      d: starPath(h.x, h.y, 11, 5),
      fill:         COLOR.hubNode,
      stroke:       COLOR.hubNodeStroke,
      "stroke-width": 1,
      "fill-opacity": isActive ? 1 : 0.75,
    }, g);
  }

  // ── Draw labels ───────────────────────────────────────────────────────────
  const gLabels = document.getElementById("map-labels");

  // Label offsets — tweak these if labels overlap on your final map
  const HUB_OFFSETS = {
    memphis:      { dx: -4,  dy: 24 },
    nashville:    { dx:  0,  dy: 24 },
    cookeville:   { dx:  0,  dy: -18 },
    knoxville:    { dx:  0,  dy: 24 },
    chattanooga:  { dx:  0,  dy: 24 },
  };

  for (const h of NET.hubs) {
    const off = HUB_OFFSETS[h.id] || { dx: 0, dy: 22 };
    el("text", {
      x: h.x + off.dx, y: h.y + off.dy,
      "text-anchor": "middle",
      "font-size": "11", "font-weight": "600",
      fill: COLOR.label,
    }, gLabels).textContent = h.name;
  }

  // Affiliate label offsets
  const AFF_OFFSETS = {
    "univ-memphis":  { dx: -6,  dy: -10, anchor: "middle" },
    "uthsc":         { dx:  18, dy:  -4, anchor: "start"  },
    "st-jude":       { dx: -8,  dy:  13, anchor: "middle" },
    "vanderbilt":    { dx:  0,  dy: -10, anchor: "middle" },
    "tsu":           { dx: -10, dy:  14, anchor: "middle" },
    "mtsu":          { dx:  0,  dy: -10, anchor: "middle" },
    "crossville-dc": { dx:  0,  dy: -10, anchor: "middle" },
    "ut-knoxville":  { dx:  0,  dy: -10, anchor: "middle" },
    "oak-ridge":     { dx:  14, dy:   4, anchor: "start"  },
    "utc":           { dx:  12, dy:   4, anchor: "start"  },
  };

  for (const aff of NET.affiliates) {
    const off = AFF_OFFSETS[aff.id] || { dx: 0, dy: -10, anchor: "middle" };
    el("text", {
      x: aff.x + off.dx, y: aff.y + off.dy,
      "text-anchor": off.anchor,
      "font-size": "9", "font-weight": "500",
      fill: COLOR.labelSmall,
    }, gLabels).textContent = aff.name;
  }

})();
</script>
