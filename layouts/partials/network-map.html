<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">

<section class="map-section">
  <div class="map-inner">
    <div class="map-header">
      <div>
        <div class="eyebrow">Infrastructure</div>
        <h2 class="map-title">Tennessee Research &amp; Education Network Topology</h2>
      </div>
      <div class="map-legend">
        <span class="legend-item"><span class="leg-star">&#9733;</span> Hub</span>
        <span class="legend-item"><span class="leg-dot" style="background:#27803C"></span> University / Affiliate</span>
        <span class="legend-item"><span class="leg-line" style="background:#1B5FAA"></span> Active</span>
        <span class="legend-item"><span class="leg-line leg-line--dash"></span> Planned</span>
        <span class="legend-item"><span class="leg-star" style="color:#F59E0B">&#9733;</span> Degraded</span>
      </div>
    </div>
    <div id="tren-map" style="height:420px;border-radius:10px;border:0.5px solid #dde2ea;overflow:hidden;"></div>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
(function() {
  // Network data injected by Hugo at build time from data/network.yaml
  var NET = {{ .Site.Data.network | jsonify }};

  // Tennessee state outline — embedded directly, no CDN dependency
  var TN_GEO = {"type": "Feature", "geometry": {"type": "Polygon", "coordinates": [[[-88.054868, 36.496384], [-88.071299, 36.677123], [-87.852221, 36.633308], [-86.592525, 36.655216], [-85.486183, 36.616877], [-85.289013, 36.627831], [-84.544149, 36.594969], [-83.689746, 36.584015], [-83.673316, 36.600446], [-81.679709, 36.589492], [-81.723525, 36.353984], [-81.909741, 36.304691], [-82.03571, 36.118475], [-82.216449, 36.156814], [-82.610789, 35.965121], [-82.638174, 36.063706], [-82.775097, 35.997983], [-82.994175, 35.773428], [-83.251591, 35.718659], [-83.498053, 35.565304], [-83.7719, 35.559827], [-84.018363, 35.41195], [-84.09504, 35.247642], [-84.29221, 35.225734], [-84.319594, 34.990226], [-85.606675, 34.984749], [-87.359296, 35.00118], [-88.202745, 34.995703], [-88.471115, 34.995703], [-90.311367, 34.995703], [-90.212782, 35.023087], [-90.114197, 35.198349], [-90.130628, 35.439335], [-89.944412, 35.603643], [-89.911551, 35.756997], [-89.763673, 35.811767], [-89.730812, 35.997983], [-89.533642, 36.249922], [-89.539119, 36.496384], [-89.484349, 36.496384], [-89.418626, 36.496384], [-89.298133, 36.507338], [-88.054868, 36.496384]]]}};

  var STATUS = {
    active:   { hub: "#F5C518", hs: "#8a6800", line: "#1B5FAA", dash: null,   op: 1    },
    planned:  { hub: "#F5C518", hs: "#aaa",    line: "#1B5FAA", dash: "10,6", op: 0.38 },
    degraded: { hub: "#F59E0B", hs: "#b45309", line: "#F59E0B", dash: null,   op: 1    },
    down:     { hub: "#DC2626", hs: "#991b1b", line: "#DC2626", dash: "6,4",  op: 1    },
  };

  function s(status) { return STATUS[status] || STATUS.planned; }

  // Star polygon SVG
  function starSVG(color, stroke, opacity) {
    var pts = [];
    for (var i = 0; i < 10; i++) {
      var r = i % 2 === 0 ? 11 : 5;
      var a = (i * Math.PI / 5) - Math.PI / 2;
      pts.push((r * Math.cos(a)).toFixed(1) + "," + (r * Math.sin(a)).toFixed(1));
    }
    return '<svg width="28" height="28" viewBox="-14 -14 28 28" xmlns="http://www.w3.org/2000/svg">'
      + '<polygon points="' + pts.join(" ") + '" fill="' + color + '" stroke="' + stroke + '" stroke-width="1" opacity="' + opacity + '"/>'
      + '</svg>';
  }

  // Affiliate circle SVG
  function circleSVG(filled) {
    return '<svg width="14" height="14" viewBox="-7 -7 14 14" xmlns="http://www.w3.org/2000/svg">'
      + '<circle cx="0" cy="0" r="5.5" fill="' + (filled ? "#27803C" : "white") + '" stroke="#27803C" stroke-width="1.8" fill-opacity="' + (filled ? 1 : 0.7) + '"/>'
      + '</svg>';
  }

  // Init map
  var map = L.map("tren-map", {
    center: [35.85, -86.5],
    zoom: 7,
    scrollWheelZoom: false,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: "&copy; <a href='https://www.openstreetmap.org/copyright'>OpenStreetMap</a>",
    maxZoom: 18,
  }).addTo(map);

  // Tennessee outline
  L.geoJSON(TN_GEO, { style: { color: "#94A3B8", weight: 1.5, fill: false } }).addTo(map);

  // Hub lookup
  var hubMap = {};
  NET.hubs.forEach(function(h) { hubMap[h.id] = h; });

  // Backbone links
  NET.links.forEach(function(lk) {
    var a = hubMap[lk.from], b = hubMap[lk.to];
    var st = s(lk.status);
    var opts = { color: st.line, weight: lk.status === "active" ? 3.5 : 2.5, opacity: st.op };
    if (st.dash) opts.dashArray = st.dash;
    L.polyline([[a.lat, a.lng], [b.lat, b.lng]], opts)
      .addTo(map)
      .bindPopup("<b>" + a.name + " ↔ " + b.name + "</b><br>Status: " + lk.status);
  });

  // Affiliate links
  NET.affiliates.forEach(function(af) {
    var h = hubMap[af.hub];
    var opts = {
      color: "#27803C",
      weight: 1.5,
      opacity: af.status === "active" ? 0.65 : 0.3,
    };
    if (af.status !== "active") opts.dashArray = "5,4";
    L.polyline([[af.lat, af.lng], [h.lat, h.lng]], opts).addTo(map);
  });

  // Affiliate markers
  NET.affiliates.forEach(function(af) {
    L.marker([af.lat, af.lng], {
      icon: L.divIcon({
        className: "",
        html: circleSVG(af.status === "active"),
        iconSize: [14, 14], iconAnchor: [7, 7], popupAnchor: [0, -9],
      })
    }).addTo(map).bindPopup("<b>" + af.name + "</b><br>Status: " + af.status);
  });

  // Hub markers
  NET.hubs.forEach(function(h) {
    var st = s(h.status);
    var warn = h.status === "degraded" || h.status === "down";
    var html = warn
      ? '<div style="position:relative;width:28px;height:28px">'
        + '<span class="tren-pulse" style="position:absolute;inset:-6px;border-radius:50%;background:' + st.hub + ';opacity:0.2"></span>'
        + starSVG(st.hub, st.hs, 1)
        + '</div>'
      : starSVG(st.hub, st.hs, h.status === "planned" ? 0.6 : 1);

    L.marker([h.lat, h.lng], {
      icon: L.divIcon({
        className: "",
        html: html,
        iconSize: [28, 28], iconAnchor: [14, 14], popupAnchor: [0, -16],
      })
    }).addTo(map).bindPopup("<b>" + h.name + "</b><br>Role: Network Hub<br>Status: <b>" + h.status + "</b>");
  });

})();
</script>
