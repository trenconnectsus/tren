<!-- Leaflet CSS — loaded only on pages that use this partial -->
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin=""/>

<section class="map-section">
  <div class="map-inner">
    <div class="map-header">
      <div>
        <div class="eyebrow">Infrastructure</div>
        <h2 class="map-title">Tennessee Research &amp; Education Network Topology</h2>
      </div>
      <div class="map-legend">
        <span class="legend-item"><span class="leg-star">★</span> Hub</span>
        <span class="legend-item"><span class="leg-dot" style="background:#27803C"></span> University / Affiliate</span>
        <span class="legend-item"><span class="leg-line" style="background:#1B5FAA"></span> Active</span>
        <span class="legend-item"><span class="leg-line leg-line--dash"></span> Planned</span>
        <span class="legend-item"><span class="leg-star" style="color:#F59E0B">★</span> Degraded</span>
      </div>
    </div>
    <div id="tren-map"></div>
  </div>
</section>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV/XN/TDo=" crossorigin=""></script>
<script>
(function () {
  // Network data injected by Hugo at build time
  // Edit data/network.yaml — push — map updates automatically
  const NET = {{ .Site.Data.network | jsonify }};

  // ── Status colours ────────────────────────────────────────────────────────
  const STATUS = {
    active:   { hub: "#F5C518", aff: "#27803C", line: "#1B5FAA", dash: null,    opacity: 1    },
    planned:  { hub: "#F5C518", aff: "#27803C", line: "#1B5FAA", dash: "10,8",  opacity: 0.45 },
    degraded: { hub: "#F59E0B", aff: "#F59E0B", line: "#F59E0B", dash: "8,5",   opacity: 0.9  },
    down:     { hub: "#DC2626", aff: "#DC2626", line: "#DC2626", dash: "6,4",   opacity: 0.9  },
  };

  function style(status) {
    return STATUS[status] || STATUS.planned;
  }

  // ── Initialise map ────────────────────────────────────────────────────────
  const map = L.map("tren-map", {
    center: [35.85, -86.5],
    zoom: 7,
    scrollWheelZoom: false,
    zoomControl: true,
  });

  L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors',
    maxZoom: 18,
  }).addTo(map);

  // ── Hub lookup ────────────────────────────────────────────────────────────
  const hubMap = {};
  for (const h of NET.hubs) hubMap[h.id] = h;

  // ── Backbone links ────────────────────────────────────────────────────────
  for (const link of NET.links) {
    const a = hubMap[link.from], b = hubMap[link.to];
    if (!a || !b) continue;
    const s = style(link.status);
    L.polyline([[a.lat, a.lng], [b.lat, b.lng]], {
      color:       s.line,
      weight:      link.status === "active" ? 3.5 : 2.5,
      opacity:     s.opacity,
      dashArray:   s.dash,
    }).addTo(map).bindPopup(
      "<b>" + a.name + " ↔ " + b.name + "</b><br>Status: " + link.status
    );
  }

  // ── Affiliate links ───────────────────────────────────────────────────────
  for (const aff of NET.affiliates) {
    const h = hubMap[aff.hub];
    if (!h) continue;
    const s = style(aff.status);
    L.polyline([[aff.lat, aff.lng], [h.lat, h.lng]], {
      color:     "#27803C",
      weight:    1.8,
      opacity:   aff.status === "active" ? 0.75 : 0.35,
      dashArray: aff.status === "active" ? null : "6,5",
    }).addTo(map);
  }

  // ── Hub markers (stars) ───────────────────────────────────────────────────
  function hubIcon(hub) {
    const s = style(hub.status);
    const pulse = hub.status === "degraded" || hub.status === "down"
      ? `<span class="tren-pulse" style="background:${s.hub}"></span>` : "";
    return L.divIcon({
      className: "",
      html: `<div class="tren-hub-marker" title="${hub.name} — ${hub.status}">
               ${pulse}
               <svg width="28" height="28" viewBox="-14 -14 28 28" xmlns="http://www.w3.org/2000/svg">
                 <path d="M0,-12 L2.8,-4 11.4,-4 4.6,1.5 7,10 0,5 -7,10 -4.6,1.5 -11.4,-4 -2.8,-4Z"
                   fill="${s.hub}" stroke="${hub.status==='planned'?'#999':'#7a6010'}"
                   stroke-width="1.2" opacity="${hub.status==='planned'?0.6:1}"/>
               </svg>
             </div>`,
      iconSize:   [28, 28],
      iconAnchor: [14, 14],
      popupAnchor:[0, -16],
    });
  }

  for (const h of NET.hubs) {
    L.marker([h.lat, h.lng], { icon: hubIcon(h) })
      .addTo(map)
      .bindPopup("<b>" + h.name + "</b><br>Role: Network Hub<br>Status: <b>" + h.status + "</b>");
  }

  // ── Affiliate markers (circles) ───────────────────────────────────────────
  function affIcon(aff) {
    const s = style(aff.status);
    const fill   = aff.status === "active"   ? s.aff : "white";
    const stroke = aff.status === "planned"  ? "#27803C" : s.aff;
    const opacity= aff.status === "planned"  ? 0.7 : 1;
    return L.divIcon({
      className: "",
      html: `<svg width="14" height="14" viewBox="-7 -7 14 14" xmlns="http://www.w3.org/2000/svg"
                  title="${aff.name}">
               <circle cx="0" cy="0" r="5.5"
                 fill="${fill}" stroke="${stroke}" stroke-width="1.8" opacity="${opacity}"/>
             </svg>`,
      iconSize:   [14, 14],
      iconAnchor: [7, 7],
      popupAnchor:[0, -9],
    });
  }

  for (const aff of NET.affiliates) {
    L.marker([aff.lat, aff.lng], { icon: affIcon(aff) })
      .addTo(map)
      .bindPopup("<b>" + aff.name + "</b><br>Status: <b>" + aff.status + "</b>");
  }

})();
</script>
