{{ define "main" }}
<article class="page-wrap">
  <div class="page-inner">
    <header class="page-header">
      <div class="eyebrow">{{ .Section | humanize }}</div>
      <h1>{{ .Title }}</h1>
      {{ if .Date }}<p class="page-date">{{ .Date.Format "January 2, 2006" }}</p>{{ end }}
    </header>
    <div class="page-content">
      {{ .Content }}
    </div>
  </div>
</article>
{{ end }}
