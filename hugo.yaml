baseURL: "https://trenconnects.us/"
title: "TREN — Tennessee Research & Education Network"
defaultContentLanguage: "en"
paginate: 10
buildFuture: true

params:
  description: "Building the statewide 100G research backbone for Tennessee's institutions of higher education."
  nsf_award: "NSF CC* Award #2430341"
  contact_email: "info@trenconnects.us"

  nav:
    - name: "About"
      url: "/about/"
    - name: "Events"
      url: "/events/"
    - name: "News"
      url: "/news/"
    - name: "Team"
      url: "/team/"
    - name: "Contact"
      url: "/contact/"

  # Social links — placeholders, replace "#" with real profile URLs
  social:
    - name: "LinkedIn"
      icon: "linkedin"
      url: "#"
    - name: "Facebook"
      icon: "facebook"
      url: "#"
    - name: "X"
      icon: "x"
      url: "#"
    - name: "YouTube"
      icon: "youtube"
      url: "#"

  institutions:
    - name: "Tennessee State University"
      abbr: "TSU"
    - name: "Middle Tennessee State University"
      abbr: "MTSU"
    - name: "Tennessee Technological University"
      abbr: "TTU"
    - name: "UT Chattanooga"
      abbr: "UTC"

markup:
  goldmark:
    renderer:
      unsafe: false

outputs:
  home:
    - HTML
  section:
    - HTML
  taxonomy:
    - HTML
  term:
    - HTML
