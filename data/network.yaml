# TREN Network Topology
# ─────────────────────────────────────────────────────────────
# status options:
#   active   = live, solid line/filled marker (green)
#   planned  = not yet live, dashed line (blue, dimmed)
#   degraded = issue detected, (yellow/orange) — triggers alert
#   down     = offline (red)
#
# To mark a link live: change status: planned → active and push.
# ─────────────────────────────────────────────────────────────

