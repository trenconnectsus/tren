# TREN Network Topology
# ─────────────────────────────────────────────────────────────
# To mark a link or node as live:
#   change  status: planned
#   to      status: active
# Then commit and push — the map updates automatically.
# ─────────────────────────────────────────────────────────────

# Hub nodes — backbone anchor points (rendered as yellow stars)
# x/y are positions in a 800x330 coordinate space
hubs:
  - id: memphis
    name: Memphis
    x: 75
    y: 210
    status: planned

  - id: nashville
    name: Nashville
    x: 355
    y: 162
    status: planned

  - id: cookeville
    name: Cookeville
    x: 492
    y: 142
    status: planned

  - id: knoxville
    name: Knoxville
    x: 662
    y: 135
    status: planned

  - id: chattanooga
    name: Chattanooga
    x: 538
    y: 238
    status: planned

# Backbone links between hubs (rendered as blue lines)
links:
  - from: memphis
    to: nashville
    status: planned

  - from: nashville
    to: cookeville
    status: planned

  - from: cookeville
    to: knoxville
    status: planned

  - from: nashville
    to: chattanooga
    status: planned

  - from: cookeville
    to: chattanooga
    status: planned

  - from: memphis
    to: chattanooga
    status: planned

